<!doctype html>
<html>
  <head>
    <title>Lesson 3a-f</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function CounterApp() {
        const [count, setCount] = React.useState([0, 0]);

        function Counter({ count, setCount, index }) {

          function addClick() {
            setCount([
              index === 0 ? count[0] + 1 : count[0],
              index === 1 ? count[1] + 1 : count[1],
            ]);
          }

          return (
            <>
              <button onClick={addClick}>
                Clicked{" "}
                {count[index] === 1
                  ? count[index] + " time"
                  : count[index] + " times"}
              </button>
            </>
          );
        }

        function Reset({setCount}) {
          function reset() {
            setCount([0, 0]);
          }

          return (
            <>
              <button onClick={reset}>Reset</button>
            </>
          );
        }

        return (
          <>
            <div>
              <Counter count={count} setCount={setCount} index={0} />
              <Counter count={count} setCount={setCount} index={1} />
              <Reset setCount={setCount} />
            </div>
          </>
        );
      }

      function App() {
        return (
          <>
            3a-3f
            <CounterApp />
            <hr />
          </>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
